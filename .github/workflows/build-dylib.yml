name: Build ZombiMod Dylib

on:
  workflow_dispatch:
    inputs:
      license_key:
        description: 'License key (e.g. ZOMBI-DAY-A1B2C3D4E5F67890)'
        required: true
        default: 'ZOMBI-DAY-REPLACEME'
        type: string
      bundle_id:
        description: 'Target game bundle ID'
        required: true
        default: 'com.dts.freefireth'
        type: string

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Theos dependencies
        run: |
          brew install ldid dpkg xz

      - name: Install Theos
        run: |
          export THEOS=~/theos
          git clone --recursive https://github.com/theos/theos.git $THEOS
          echo "THEOS=$THEOS" >> $GITHUB_ENV
          echo "$THEOS/bin" >> $GITHUB_PATH

      - name: Download iOS 16.5 SDK
        run: |
          curl -fsSL -o /tmp/sdk.tar.xz \
            "https://github.com/theos/sdks/releases/download/master-146e41f/iPhoneOS16.5.sdk.tar.xz"
          tar -xf /tmp/sdk.tar.xz -C $THEOS/sdks/
          echo "SDKs: $(ls $THEOS/sdks/)"

      - name: Inject build variables
        run: |
          sed -i '' "s|#define ZM_LICENSE_KEY @\".*\"|#define ZM_LICENSE_KEY @\"${{ github.event.inputs.license_key }}\"|" ZMLicenseManager.m
          sed -i '' "s|^export BUNDLE_FILTER.*|export BUNDLE_FILTER = ${{ github.event.inputs.bundle_id }}|" Makefile
          echo "=== Verification ==="
          grep "ZM_LICENSE_KEY\|ZM_API_BASE" ZMLicenseManager.m
          grep "BUNDLE_FILTER" Makefile

      - name: Build dylib
        run: |
          make clean
          make package FINALPACKAGE=1
        env:
          ARCHS: arm64
          TARGET: iphone:clang:16.5:14.0

      - name: Find outputs
        id: find
        run: |
          echo "=== Built files ==="
          find .theos packages -name "*.dylib" -o -name "*.deb" 2>/dev/null || true
          DYLIB=$(find .theos/obj -name "*.dylib" 2>/dev/null | head -1)
          DEB=$(find packages -name "*.deb" 2>/dev/null | head -1)
          echo "dylib=$DYLIB" >> $GITHUB_OUTPUT
          echo "deb=$DEB" >> $GITHUB_OUTPUT
          echo "Dylib: $DYLIB"
          echo "Deb:   $DEB"

      - name: Upload dylib
        uses: actions/upload-artifact@v4
        with:
          name: ZombiMod-dylib-${{ github.run_number }}
          path: ${{ steps.find.outputs.dylib }}
          if-no-files-found: error
          retention-days: 30

      - name: Upload deb
        uses: actions/upload-artifact@v4
        with:
          name: ZombiMod-deb-${{ github.run_number }}
          path: ${{ steps.find.outputs.deb }}
          if-no-files-found: warn
          retention-days: 30

      - name: Summary
        run: |
          echo "## ✅ ZombiMod Build #${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Key | \`${{ github.event.inputs.license_key }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Target | \`${{ github.event.inputs.bundle_id }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| API | \`https://dynamic-link-library--nelinelikd.replit.app/api\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "⬇️ Download **.dylib** from the Artifacts section above." >> $GITHUB_STEP_SUMMARY
